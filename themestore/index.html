<html><head>
    <script>appname="Theme Store"</script>
    <style>html{background:#222}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <script src="https://projectjshost.github.io/jquery/jquery-3.5.1.min.js"></script>
    <script src="https://projectjshost.github.io/jsappapi/2.2/main.js"></script>
    <script src="./main.js"></script>
    <link type="text/css" href="./style.css" rel="stylesheet">
</head>
<body>
    <header>
        <p1 id="header"></p1>
    </header>
          <p>Project JS Theme Store</p>
          <button onclick="resetTheme()">Reset Theme</button>
            <p><b>Available Themes:</b></p>
            <div class="area theme">
              <e>Arc<button onclick="installTheme(':root{--background:#3f4551;--background2:#3f4551;--shadow:#282c37;--foreground:#fff;--foreground2:#888;--foreground3:#3f4551;--elementcolor:#353944;--active:#282c37;--border:#282c37;--transparent:#00000000;--black:#000;--darkoverlay:#00000086}')">Install</button></e>
              <e>Google<button onclick="installTheme(':root{--background:#fff;--background2:#fff;--shadow:#fff;--foreground:#444;--foreground2:#888;--foreground3:#2272e5;--elementcolor:#eee;--active:#eee;--border:var(--main);--transparent:#00000000;--black:#666;--darkoverlay:#00000086;--main:#2272e5}header{background-color:#fff;text-align:left;color:#000}button{background-color:var(--main);color:#fff;border:0!important}button:hover{background-color:#1a56ad}select{border:0!important}select:active{border:0!important}')">Install</button></e>
              <e>High Contrast Dark<button  onclick="installTheme(':root{--background:#000;--background2:#000;--shadow:#000;--foreground:#fff;--foreground2:#fff;--foreground3:#000;--elementcolor:#000;--active:#fff;--border:#fff;--transparent:#00000000;--black:#000;--darkoverlay:#000}')">Install</button></e>
              <e>High Contrast Light<button onclick="installTheme(':root{--background:#fff;--background2:#fff;--shadow:#fff;--foreground:#000;--foreground2:#000;--foreground3:#fff;--elementcolor:#fff;--active:#000;--border:#000;--transparent:#ffffff00;--black:#fff;--darkoverlay:#fff}')">Install</button></e>
            </div>
          
          
</body>
</html>

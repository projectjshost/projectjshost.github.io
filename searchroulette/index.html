<html><head>
  <script>appname="Search Roulette"</script>
  <style>html{background:#222}</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
  <script src="https://projectjshost.github.io/jquery/jquery-3.5.1.min.js"></script>
  <script src="https://projectjshost.github.io/jsappapi/2.2/main.js"></script>
  <script src="./main.js"></script>
</head>
<body>
    <header>
      <p1 id="header"></p1>
    </header>
          <p2><b>Instructions:</b></p2>
          <p>First select a search weirdness, then click on the "Roulette!" button to do a random weird search.</p>
          <b><p id='2'>Times Played: 0</p></b>
          <div class="area">
            <p id='3'>Search Weirdness Level: Weird</p>
          <button onclick='setlevel(0)'>Weird</button>
          <button onclick='setlevel(6)'>Weirder</button>
          <button onclick='setlevel(12)'>Illegal</button>
        </div>
        <div class="area">
          <p id='4'>Search Engine: Google</p>
          <p class='alt'>Tip: Use DuckDuckGo when Search Weirdness Level is on illegal!</p>
        <button onclick='setSE(0)'>Google</button>
        <button onclick='setSE(1)'>DuckDuckGo</button>
        <button onclick='setSE(2)'>Bing</button>
        <button onclick='setSE(3)'>debug</button>
      </div>
          <button onclick='roulette()'>Roulette!</button>
</body>
</html>

<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <title>Project JS Desktop</title>  
        <link rel="stylesheet" href="./internal/styles.css">
    </head>
    <body onload="startTime();">
        <header>
        <p class="title">JSDesktop</p>
        <div class="headerbuttons">
            <button onclick="openAppDrawer()">Apps</button>
        </div>
        
        </header>
        <div class="appDrawer" id="appDrawer">
            <iframe src="/appcenter/?platform=JSdesktop&interface=material&theme=dark&splash=false"></iframe>
        </div>
        <div class="sidebar">
            <div class="block">
                <h3>Clock</h3>
                <p id="time">00:00:00</p><br>
                <p id="date">-</p>
            </div>
            <div class="block">
                <h3>Info</h3>
                <p id="JSDesktopPlatform" class="small"></p><br>
                <p id="JSDesktopROOT" class="small"></p><br>
                <p id="systemVersion" class="small"></p><br>
            </div>
            
            
        </div>
        
        <div class="watermark">Project JS Desktop</div>
    </body>
    <script src="internal/scripts/jquery-3.5.1.min.js"></script>
    <script src="internal/scripts/moment.min.js"></script>
    <script src="internal/settings.js"></script>
    <script src="internal/main.js"></script>
    <script src="internal/apps.js"></script>
    <script src="internal/scripts/jquery-ui.js"></script>
    <script src="internal/wm.js"></script>
    <script src="internal/scripts/shortcuts.js"></script>
</html>

<html>
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
	<style>html{background:#000}</style>
    <script>appname = "App Center"</script>
    <script src="https://www.unpkg.com/jquery/dist/jquery.min.js"></script>
	<script src="/apiLoader/main.js"></script>
</head>
<body>
    <header><p1 id="header"></p1></header>
    <div class="appOverview">
        <p2>System</p2>
        <div class="area">
            <div class="appTile" onclick="openApp('settings')"><div class="appIcon icon-settings"></div><p>Settings</p></div>
            <div class="appTile" onclick="openApp('themeManager')"><div class="appIcon icon-themes"></div><p>Themes</p></div>
			<div class="appTile" onclick="openApp('terminal')"><div class="appIcon icon-terminal"></div><p>Terminal</p></div>
		</div>

        <p2>Tools</p2>
        <div class="area">
            <div class="appTile" onclick="openApp('quicknote')"><div class="appIcon icon-note"></div><p>QuickNote</p></div>
            <div class="appTile" onclick="openApp('encryptpad')"><div class="appIcon icon-note_secure"></div><p>EncryptPad</p></div>
			<div class="appTile" onclick="openApp('safeencrypt')"><div class="appIcon icon-key"></div><p>SafeEncrypt</p>
            </div>
            <div class="appTile" onclick="openApp('codepad')"><div class="appIcon icon-code"></div><p>CodePad</p></div>
            <div class="appTile" onclick="openApp('calculator')"><div class="appIcon icon-calculator"></div><p>Calculator</p></div>
            <div class="appTile" onclick="openApp('random')"><div class="appIcon icon-dice"></div><p>Random</p></div>
		</div>

		<p2>AI Tools</p2>
        <div class="area">
			<div class="appTile" onclick="location.replace('https://ysharma-explore-llamav2-with-tgi.hf.space/?__theme=dark')"><div class="appIcon icon-chat_ai"></div><p>Llama 2 Chat</p></div>
			<div class="appTile" onclick="location.replace('https://uwnlp-guanaco-playground-tgi.hf.space/?__theme=dark')"><div class="appIcon icon-chat_ai"></div><p>Guanaco Chat</p></div>
			<div class="appTile" onclick="location.replace('https://huggingfaceh4-falcon-chat.hf.space/?__theme=dark')"><div class="appIcon icon-chat_ai"></div><p>Falcon Chat</p></div>
			<div class="appTile" onclick="location.replace('https://stabilityai-stable-diffusion.hf.space/?__theme=dark')"><div class="appIcon icon-image"></div><p>Stable Diffusion</p></div>
		</div>

        <p2>Games</p2>
		<div class="area">
            <div class="appTile" onclick="resizeApp(1280,720);location.replace('https://mario.xpixv.com/')"><div class="appIcon icon-questionblock"></div><p>FullScreen Mario</p></div>
            <div class="appTile" onclick="resizeApp(1280,720);location.replace('https://hexgl.bkcore.com/play/')"><div class="appIcon icon-hexgl"></div><p>HexGL</p></div>
            <div class="appTile" onclick="resizeApp(1280,720);location.replace('https://2048-opera-pwa.surge.sh/')"><div class="appIcon icon-2048"></div><p>2048</p></div>
            <div class="appTile" onclick="resizeApp(1280,720);location.replace('https://tmaiadev-tetra.netlify.app/')"><div class="appIcon icon-tetra"></div><p>Tetra</p></div>
            <div class="appTile" onclick="resizeApp(1280,720);location.replace('https://mahjong.jull.dev/')"><div class="appIcon icon-mahjong"></div><p>Mahjong</p></div>
        </div>
        <p2>3rd Party Tools</p2>
		<div class="area">
            <div class="appTile" onclick="location.replace('https://appsco.pe/')"><div class="appIcon icon-appscope"></div><p>Appscope</p></div>
            <div class="appTile" onclick="resizeApp(921,644);location.replace('https://editor.method.ac/')"><div class="appIcon icon-methoddraw"></div><p>Method Draw</p></div>
		</div>
</html>

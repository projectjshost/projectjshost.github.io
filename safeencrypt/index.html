<!DOCTYPE html>
<html>

	<head>

		<script>appname = "Encrypt Text";</script>
		<style>
			html {
				background: #000
			}
		</style>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
		<script src="/jsappapi/latest/main.js" type="module"></script>

	<body>

<html>

	<head>
		<script>appname = "Random"</script>
		<style>
			html {
				background: #000
			}
		</style>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
		<script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
		<script src="/jsappapi/latest/main.js"></script>
		<script src="./main.js"></script>
	</head>

	<body>
		<header>
			<p1 id="header"></p1>
		</header>
		<div class="area">
			<p2>Random Number</p2>
			<p>Min:</p>
			<input type="number" min="0" value="1" id="randomNumMin">
			<p>Max:</p>
			<input type="number" min="1" value="10" id="randomNumMax"><br>
			<button class="main" onclick="randomNumGen()"><span class="Icon">play_arrow</span>Generate</button>
			<p>Result: </p><b>
				<p id="randomNumResult" class="user-select"></p>
			</b>
		</div>
		<div class="area">
			<p2>Random Password</p2>
			<p>Length:</p>
			<input type="number" min="0" value="16" id="randomPassLen">
			<div class="toggleSwitchContainer">
				<label class="switch">
					<input type="checkbox" id="includeUpperCase" checked="true">
					<span class="slider"></span>
				</label>
				<label for="includeUpperCase">Include uppercase</label>
			</div>
			<div class="toggleSwitchContainer">
				<label class="switch">
					<input type="checkbox" id="includeLowerCase" checked="true">
					<span class="slider"></span>
				</label>
				<label for="includeLowerCase">Include lowercase</label>
			</div>
			<div class="toggleSwitchContainer">
				<label class="switch">
					<input type="checkbox" id="includeNumbers" checked="true">
					<span class="slider"></span>
				</label>
				<label for="includeNumbers">Include numbers</label>
			</div>
			<div class="toggleSwitchContainer">
				<label class="switch">
					<input type="checkbox" id="includeSymbols" checked="true">
					<span class="slider"></span>
				</label>
				<label for="includeSymbols">Include symbols</label>
			</div>
			<button class="main" onclick="randomPassGen()"><span class="Icon">play_arrow</span>Generate</button>
			<p>Result: </p><b>
				<p id="randomPassResult" class="user-select"></p>
			</b>
		</div>

	</body>

</html>

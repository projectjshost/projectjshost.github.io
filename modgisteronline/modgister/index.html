<!DOCTYPE html>
<html lang="nl-nl">

<head>
    <link rel="shortcut icon" href="https://projectjshost.github.io/modgisteronline/modgister/themes/assets/favicon.png" />
    <title data-ng-bind-template="{{pageTitle}}"></title>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width" />
    <script src="/oidc/client/oidc-client.min.js?_v=1.4.1"></script>
    <script src="/oidc_config.js"></script>
    <script src="https://projectjshost.github.io/modgisteronline/modgister/settings.js"></script>
    <script src="https://projectjshost.github.io/modgisteronline/modgister/mods/themeEngine.js"></script>
<meta name="release" content="false"><link href="print.css" rel="stylesheet" media="print"></head>
<style>html{background-color: #111;color: #fff}</style>
<body onload="loadTheme();">
    <header class="header">
        <div class="logo">
            <a href="{{vandaagUrl}}"><span class="icon-logo"></span>Modgister</a>
        </div>
        <div class="logoff" data-logoff="logoff"></div>
        <div class="header-user" data-sm-logged-in-user="logged-in-user"></div>
        <div id="kind-kiezer" data-ng-if="showPersoonKiezer" class="user" aria-haspopup="true"
            data-sm-kindkiezer="ouder"></div>
    </header>

    <div data-sm-toast="toasts"></div>

    <div data-sm-dialog="dialog"></div>
    <div data-ng-class="{'nav-toggle': menuExpanded === true}" class="master-view">
        <div data-sm-menu="menu"></div>
        <div data-ng-view="ng-view" class="view"></div>
    </div>
    <mg-speech-bubble></mg-speech-bubble>
    
<script type="text/javascript" src="https://projectjshost.github.io/modgisteronline/modgister/app.js"></script></body>

</html>

<html><head>
  <script>appname="Settings"</script>
  <style>html{background:#222}</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
  <script src="https://projectjshost.github.io/jquery/jquery-3.5.1.min.js"></script>
  <script src="./settings.js"></script>
<script src="https://projectjshost.github.io/jsappapi/2.2/main.js"></script>
</head>
<body onload="settingsInit();">
    <header>
      <p1 id="header"></p1>
    </header>
          <p>Project JS Settings</p>
          <p2>Theme</p2> 
          <select id="themeSelect">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="custom">Other (CSS)</option>
          </select>
          <button onclick="updateTheme();">Apply</button>
          <button onclick="importTheme();">Import from .CSS file</button>
          <p2>Security</p2>
            <input type="checkbox" id="hideTabCB" onclick="updatehideTab()">
            <label for="hideTabCB">Hide app name and icon</label>
          <p2>Reset</p2>
          <button onclick="resetAll()">Reset All Settings</button>
</body>
</html>

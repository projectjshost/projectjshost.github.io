<html>

	<head>
		<link rel="manifest" href="/manifest.json">
		<script>
			appname = "Settings";
		</script>
		<style>
			html {
				background: #000
			}
		</style>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
		<script src="/jsappapi/latest/main.js" type="module"></script>
		<script src="settings.js" defer type="module"></script>
	</head>

	<body>
		<header>
			<p1 id="header"></p1>
		</header>
		<div class="area">
			<p2><span class="icon">home</span>Apps</p2>
			<p>Restore all hidden apps on the App Center.</p>
			<button id="restoreHiddenAppsButton"><span class="icon">restart_alt</span>Restore</button>
		</div>
		<div class="area">
			<p2><span class="icon">palette</span>Theme</p2>
			<p id="selectedThemeLabel"></p>
			<div id="themeList"></div>
			<button id="editThemeButton"><span class="icon">brush</span>Create a custom theme</button>
			<button id="deleteThemeButton"><span class="icon">delete</span>Delete custom theme</button>

			<div class="toggleSwitchContainer">
				<label class="switch">
					<input type="checkbox" id="uiTransparency">
					<span class="slider"></span>
				</label>
				<label for="uiTransparency">Enable UI transparency (when wallpaper)</label>
			</div>
		</div>
		<div class="area">
			<p2><span class="icon">wallpaper</span>Wallpaper</p2>
			<p id="wallpaperName">Current Wallpaper: None</p>
			<button id="importWallpaperButton"><span class="icon">file_upload</span>Import</button>
			<button id="clearWallpaperButton"><span class="icon">clear</span>Clear</button>
			<button id="downloadWallpaperButton"><span class="icon">download</span>Download</button>
			<button id="getSourceButton"><span class="icon">launch</span>Source</button>
			<div class="area" id="wallpaperList"></div>

			<div class="toggleSwitchContainer">
				<label class="switch">
					<input type="checkbox" id="forceWallpaper">
					<span class="slider"></span>
				</label>
				<label for="forceWallpaper">Display wallpaper on all apps</label>
			</div>

			<div class="toggleSwitchContainer">
				<label class="switch">
					<input type="checkbox" id="blurWallpaper">
					<span class="slider"></span>
				</label>
				<label for="blurWallpaper">Blur wallpaper</label>
			</div>

			<div class="toggleSwitchContainer">
				<label class="switch">
					<input type="checkbox" id="darkenWallpaper">
					<span class="slider"></span>
				</label>
				<label for="blurWallpaper">Darken wallpaper</label>
			</div>
		</div>

		<div class="area">
			<p2><span class="icon">restart_alt</span>Reset</p2>
			<p>All data from all apps will be deleted permanently!</p>
			<button id="resetAllButton"><span class="icon">warning_amber</span>Reset settings and delete all
				data</button>
		</div>

		<div class="area">
			<p2><span class="icon">info</span>About</p2>
			<img src="/icons/logo.svg" height="64px" width="auto">
			<p>Project JS App Center</p>
			<p id="versionString"></p>
			<p id="versionStringJQ"></p>
			<p id="appCount"></p>
		</div>

	</body>

</html>
